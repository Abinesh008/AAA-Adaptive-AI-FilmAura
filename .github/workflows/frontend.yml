name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: TypeScript validation
      run: |
        cd frontend
        npx tsc --noEmit

    - name: Run ESLint
      run: |
        cd frontend
        npm run lint

    - name: Next.js Production Build
      env:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_TELEMETRY_DISABLED: 1
      run: |
        cd frontend
        npm run build
