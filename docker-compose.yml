version: '3.8'

services:
  # Relational Database (PostgreSQL)
  db:
    image: postgres:16-alpine
    container_name: filmaura_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-filmaura}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d filmaura"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - filmaura_network

  # Graph Database (Neo4j)
  neo4j:
    image: neo4j:5.20-community
    container_name: filmaura_neo4j
    restart: always
    ports:
      - "7474:7474" # HTTP port
      - "7687:7687" # Bolt port
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - filmaura_network

  # Vector Database (ChromaDB)
  chroma:
    image: chromadb/chroma:latest
    container_name: filmaura_chroma
    restart: always
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/data
    environment:
      - ANONYMIZED_TELEMETRY=False
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - filmaura_network

  # Caching and Rate Limiter (Redis - Optional fallback)
  redis:
    image: redis:7-alpine
    container_name: filmaura_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - filmaura_network

  # FastAPI Backend Application Gateway
  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: filmaura_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - APP_NAME=AAA - Adaptive AI FilmAura
      - APP_ENV=production
      - API_V1_STR=/api/v1
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-filmaura}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - CACHE_PROVIDER=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      chroma:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - filmaura_network

  # Next.js Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: filmaura_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - filmaura_network

  # Observability - Prometheus Collector
  prometheus:
    image: prom/prometheus:latest
    container_name: filmaura_prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - web
    networks:
      - filmaura_network

  # Observability - Grafana Visualizations dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: filmaura_grafana
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/provisioning/dashboards/json:/etc/grafana/provisioning/dashboards/json
    depends_on:
      - prometheus
    networks:
      - filmaura_network

volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_import:
    driver: local
  neo4j_plugins:
    driver: local
  chroma_data:
    driver: local
  redis_data:
    driver: local

networks:
  filmaura_network:
    driver: bridge
