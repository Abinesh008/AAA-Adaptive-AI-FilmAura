version: '3.8'

services:
  # Relational Database (PostgreSQL)
  db:
    image: postgres:16-alpine
    container_name: filmaura_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-filmaura}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - filmaura_network

  # Graph Database (Neo4j)
  neo4j:
    image: neo4j:5.20-community
    container_name: filmaura_neo4j
    restart: always
    ports:
      - "7474:7474" # HTTP port
      - "7687:7687" # Bolt port
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    networks:
      - filmaura_network

  # Vector Database (ChromaDB)
  chroma:
    image: chromadb/chroma:latest
    container_name: filmaura_chroma
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/data
    environment:
      - ANONYMIZED_TELEMETRY=False
    networks:
      - filmaura_network

  # FastAPI Backend Application
  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: filmaura_backend
    restart: always
    ports:
      - "8080:8000"
    env_file:
      - ./backend/.env
    environment:
      - APP_NAME=AAA - Adaptive AI FilmAura
      - APP_ENV=production
      - API_V1_STR=/api/v1
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-filmaura}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - CACHE_PROVIDER=memory
    depends_on:
      - db
      - neo4j
      - chroma
    networks:
      - filmaura_network

volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_import:
    driver: local
  neo4j_plugins:
    driver: local
  chroma_data:
    driver: local

networks:
  filmaura_network:
    driver: bridge
